version: '3.8'

services:
  # ─── Databases ───────────────────────────────────────────────
  users-db:
    image: postgres:15-alpine
    container_name: users-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users_db
    ports:
      - "5433:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  products-db:
    image: postgres:15-alpine
    container_name: products-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: products_db
    ports:
      - "5434:5432"
    volumes:
      - products-db-data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  orders-db:
    image: postgres:15-alpine
    container_name: orders-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders_db
    ports:
      - "5435:5432"
    volumes:
      - orders-db-data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Services ─────────────────────────────────────────────────
  user-service:
    build: ./user-service
    container_name: user-service
    environment:
      PORT: 3001
      DB_HOST: users-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: users_db
      JWT_SECRET: supersecretjwtkey123
    depends_on:
      users-db:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

  product-service:
    build: ./product-service
    container_name: product-service
    environment:
      PORT: 3002
      DB_HOST: products-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: products_db
      JWT_SECRET: supersecretjwtkey123
    depends_on:
      products-db:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

  order-service:
    build: ./order-service
    container_name: order-service
    environment:
      PORT: 3003
      DB_HOST: orders-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: orders_db
      JWT_SECRET: supersecretjwtkey123
      PRODUCT_SERVICE_URL: http://product-service:3002
      USER_SERVICE_URL: http://user-service:3001
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
    depends_on:
      orders-db:
        condition: service_healthy
      product-service:
        condition: service_started
      user-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks:
      - ecommerce-network
    restart: unless-stopped

  notification-service:
    build: ./notification-service
    container_name: notification-service
    env_file:
      - ./notification-service/.env.example
    environment:
      PORT: 3004
    networks:
      - ecommerce-network
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      USER_SERVICE_URL: http://user-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      ORDER_SERVICE_URL: http://order-service:3003
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
      JWT_SECRET: supersecretjwtkey123
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 100
    depends_on:
      - user-service
      - product-service
      - order-service
      - notification-service
    networks:
      - ecommerce-network
    restart: unless-stopped

volumes:
  users-db-data:
  products-db-data:
  orders-db-data:

networks:
  ecommerce-network:
    driver: bridge
